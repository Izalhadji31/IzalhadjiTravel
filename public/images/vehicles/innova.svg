<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="250" fill="#f0f4f8"/>
  
  <!-- Shadow -->
  <ellipse cx="200" cy="230" rx="140" ry="15" fill="#00000015"/>
  
  <!-- Car Body -->
  <path d="M 85 145 L 110 70 L 200 45 L 300 70 L 315 145 L 315 190 Q 315 210 295 210 L 105 210 Q 85 210 85 190 Z" 
        fill="#059669" stroke="#047857" stroke-width="2"/>
  
  <!-- Glass Windows - Sports Style -->
  <path d="M 125 85 L 185 60 L 195 130 L 135 120 Z" fill="#87CEEB" opacity="0.7" stroke="#1e40af" stroke-width="1"/>
  <path d="M 200 60 L 280 80 L 295 145 L 200 130 Z" fill="#87CEEB" opacity="0.7" stroke="#1e40af" stroke-width="1"/>
  <path d="M 295 140 L 310 160 L 310 190 L 295 190 Z" fill="#87CEEB" opacity="0.6" stroke="#1e40af" stroke-width="1"/>
  
  <!-- Front Lights (Round Sports) -->
  <circle cx="105" cy="145" r="9" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  <circle cx="310" cy="145" r="9" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Grille (Sports) -->
  <circle cx="200" cy="160" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="200" y1="148" x2="200" y2="172" stroke="#333" stroke-width="1"/>
  <line x1="188" y1="160" x2="212" y2="160" stroke="#333" stroke-width="1"/>
  
  <!-- Wheels (Sporty) -->
  <circle cx="135" cy="210" r="23" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
  <circle cx="135" cy="210" r="17" fill="#4a5568"/>
  <circle cx="135" cy="210" r="11" fill="#2d3748"/>
  <circle cx="135" cy="210" r="5" fill="#000"/>
  
  <circle cx="275" cy="210" r="23" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
  <circle cx="275" cy="210" r="17" fill="#4a5568"/>
  <circle cx="275" cy="210" r="11" fill="#2d3748"/>
  <circle cx="275" cy="210" r="5" fill="#000"/>
  
  <!-- Racing Stripe -->
  <line x1="200" y1="45" x2="200" y2="210" stroke="#FFD700" stroke-width="3" opacity="0.8"/>
  
  <!-- Bumper -->
  <rect x="85" y="198" width="230" height="10" fill="#333" stroke="#1a202c" stroke-width="1"/>
  
  <!-- Brand Text -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    TOYOTA INNOVA
  </text>
</svg>