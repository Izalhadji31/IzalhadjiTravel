<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="250" fill="#f0f4f8"/>
  
  <!-- Shadow -->
  <ellipse cx="200" cy="230" rx="140" ry="15" fill="#00000015"/>
  
  <!-- Car Body -->
  <path d="M 80 120 L 100 80 L 180 60 L 280 60 L 320 100 L 320 180 Q 320 200 300 200 L 100 200 Q 80 200 80 180 Z" 
        fill="#DC2626" stroke="#991B1B" stroke-width="2"/>
  
  <!-- Glass Windows -->
  <path d="M 110 90 L 160 75 L 170 100 L 120 110 Z" fill="#87CEEB" opacity="0.7" stroke="#1e40af" stroke-width="1"/>
  <path d="M 175 75 L 270 65 L 280 100 L 180 105 Z" fill="#87CEEB" opacity="0.7" stroke="#1e40af" stroke-width="1"/>
  <path d="M 280 105 L 310 120 L 315 180 L 290 190 Z" fill="#87CEEB" opacity="0.6" stroke="#1e40af" stroke-width="1"/>
  
  <!-- Front Lights -->
  <circle cx="95" cy="150" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
  <circle cx="310" cy="150" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
  
  <!-- Grille -->
  <rect x="95" y="160" width="20" height="25" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="105" y1="160" x2="105" y2="185" stroke="#333" stroke-width="1"/>
  <line x1="95" y1="168" x2="115" y2="168" stroke="#333" stroke-width="0.8"/>
  <line x1="95" y1="176" x2="115" y2="176" stroke="#333" stroke-width="0.8"/>
  
  <!-- Wheels -->
  <circle cx="130" cy="200" r="22" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
  <circle cx="130" cy="200" r="18" fill="#4a5568"/>
  <circle cx="130" cy="200" r="12" fill="#2d3748"/>
  <circle cx="130" cy="200" r="6" fill="#000"/>
  
  <circle cx="280" cy="200" r="22" fill="#2d3748" stroke="#1a202c" stroke-width="2"/>
  <circle cx="280" cy="200" r="18" fill="#4a5568"/>
  <circle cx="280" cy="200" r="12" fill="#2d3748"/>
  <circle cx="280" cy="200" r="6" fill="#000"/>
  
  <!-- Door Line -->
  <line x1="190" y1="80" x2="190" y2="200" stroke="#991B1B" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Bumper -->
  <rect x="80" y="190" width="240" height="8" fill="#333" stroke="#1a202c" stroke-width="1"/>
  
  <!-- Brand Text -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
    TOYOTA AVANZA
  </text>
</svg>